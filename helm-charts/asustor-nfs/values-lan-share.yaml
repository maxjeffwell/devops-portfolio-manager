# NFS Subdir External Provisioner — ASUSTOR lan-share
# Chart: nfs-subdir-external-provisioner/nfs-subdir-external-provisioner
# LV: /dev/vg-ssd/lan-share (1.5T, ext4)
# Export: 192.168.50.0/24 only — MUST add 10.0.0.0/24 to /etc/exports
#
# Prerequisites:
#   Add to ASUSTOR /etc/exports (and S97lvm-nfs init script):
#   /mnt/lan-share 10.0.0.0/24(rw,sync,no_subtree_check,no_root_squash,fsid=101)

replicaCount: 1
strategyType: Recreate

nfs:
  server: 10.0.0.4
  path: /mnt/lan-share
  mountOptions:
    - nfsvers=4
    - noatime
    - hard
    - intr
  reclaimPolicy: Retain

storageClass:
  create: true
  provisionerName: cluster.local/asustor-lan-share
  name: asustor-lan
  defaultClass: false
  allowVolumeExpansion: true
  reclaimPolicy: Retain
  archiveOnDelete: true
  onDelete: retain
  pathPattern: "${.PVC.namespace}-${.PVC.name}"
  accessModes: ReadWriteOnce
  volumeBindingMode: Immediate

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi

nodeSelector:
  kubernetes.io/hostname: vmi3115606

rbac:
  create: true

serviceAccount:
  create: true

leaderElection:
  enabled: true

labels: {}
tolerations: []
