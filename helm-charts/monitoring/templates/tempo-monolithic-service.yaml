{{- if .Values.tempoMonolithic.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: tempo-monolithic
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/component: monolithic
spec:
  type: ClusterIP
  ports:
    - name: http-metrics
      port: 3200
      targetPort: http-metrics
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
  selector:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/component: monolithic
---
apiVersion: v1
kind: Service
metadata:
  name: tempo-monolithic-headless
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/component: monolithic
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http-metrics
      port: 3200
      targetPort: http-metrics
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
  selector:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/component: monolithic
{{- end }}
