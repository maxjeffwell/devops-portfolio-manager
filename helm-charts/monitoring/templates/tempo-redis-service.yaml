{{- if .Values.tempoRedis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: tempo-redis
  labels:
    app.kubernetes.io/name: tempo-redis
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
  selector:
    app.kubernetes.io/name: tempo-redis
    app.kubernetes.io/component: cache
{{- end }}
