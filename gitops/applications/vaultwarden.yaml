apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vaultwarden
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/maxjeffwell/devops-portfolio-manager.git
    targetRevision: main
    path: k8s/vaultwarden
  destination:
    server: https://kubernetes.default.svc
    namespace: vaultwarden
  ignoreDifferences:
    # ESO injects defaults on every data entry — ignore to avoid permanent OutOfSync.
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
    # CNPG operator (field manager "manager") injects many spec defaults; ignore
    # everything it owns so ArgoCD only reconciles the fields we set in git.
    # Narrow jsonPointers were whack-a-mole and left the Cluster permanently OutOfSync.
    - group: postgresql.cnpg.io
      kind: Cluster
      managedFieldsManagers:
        - manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
