# NFS Subdir External Provisioner — ASUSTOR backups
# Chart: nfs-subdir-external-provisioner/nfs-subdir-external-provisioner
# LV: /dev/vg-ssd/backups (1T, ext4) — 380G used
# Export: 10.0.0.0/24 + 192.168.50.0/24

replicaCount: 1
strategyType: Recreate

nfs:
  server: 10.0.0.4
  path: /mnt/backups
  mountOptions:
    - nfsvers=4
    - noatime
    - hard
    - intr
  reclaimPolicy: Retain

storageClass:
  create: true
  provisionerName: cluster.local/asustor-backups
  name: asustor-backups
  defaultClass: false
  allowVolumeExpansion: true
  reclaimPolicy: Retain
  archiveOnDelete: true
  onDelete: retain
  pathPattern: "${.PVC.namespace}-${.PVC.name}"
  accessModes: ReadWriteOnce
  volumeBindingMode: Immediate

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi

# Pinned to vmi2951245 (control-plane) for reliable API access. vmi3115606
# has chronic Tailscale-to-control-plane micro-blips causing ~hourly pod
# restarts; this Deployment does leader-election (frequent API writes) so it
# was an unlucky-victim of that issue. Moved 2026-05-25.
nodeSelector:
  kubernetes.io/hostname: vmi2951245

rbac:
  create: true

serviceAccount:
  create: true

leaderElection:
  enabled: true

labels: {}
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: PreferNoSchedule
