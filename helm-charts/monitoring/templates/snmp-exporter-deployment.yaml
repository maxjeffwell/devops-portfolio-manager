{{- if .Values.snmpExporter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snmp-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: snmp-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: snmp-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: snmp-exporter
      annotations:
        # Re-roll pods when config changes
        checksum/config: {{ include (print $.Template.BasePath "/snmp-exporter-configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.snmpExporter.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      containers:
        - name: snmp-exporter
          image: "{{ .Values.snmpExporter.image.repository }}:{{ .Values.snmpExporter.image.tag }}"
          args:
            - --config.file=/etc/snmp_exporter/snmp.yml
            - --web.listen-address=:9116
          ports:
            - name: http
              containerPort: 9116
          resources:
            requests:
              cpu: {{ .Values.snmpExporter.resources.requests.cpu }}
              memory: {{ .Values.snmpExporter.resources.requests.memory }}
            limits:
              memory: {{ .Values.snmpExporter.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/snmp_exporter
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: config
          configMap:
            name: snmp-exporter-config
{{- end }}
---
{{- if .Values.snmpExporter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: snmp-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: snmp-exporter
spec:
  selector:
    app.kubernetes.io/name: snmp-exporter
  ports:
    - name: http
      port: 9116
      targetPort: http
{{- end }}
