{{- if .Values.crowdsec.lapi.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: crowdsec-lapi
  namespace: {{ .Release.Namespace }}
  labels:
    app: crowdsec-lapi
spec:
  type: ClusterIP
  selector:
    app: crowdsec-lapi
  ports:
    - name: api
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 6060
      targetPort: 6060
{{- end }}
