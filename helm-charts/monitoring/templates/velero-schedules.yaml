{{- if .Values.veleroSchedules.enabled }}
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-backup
  namespace: {{ .Values.veleroSchedules.namespace | default "velero" }}
spec:
  schedule: {{ .Values.veleroSchedules.daily.schedule | quote }}
  template:
    csiSnapshotTimeout: {{ .Values.veleroSchedules.csiSnapshotTimeout | default "20m" }}
    excludedNamespaces:
      {{- toYaml .Values.veleroSchedules.excludedNamespaces | nindent 6 }}
    ttl: {{ .Values.veleroSchedules.daily.ttl }}
---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: weekly-backup
  namespace: {{ .Values.veleroSchedules.namespace | default "velero" }}
spec:
  schedule: {{ .Values.veleroSchedules.weekly.schedule | quote }}
  template:
    csiSnapshotTimeout: {{ .Values.veleroSchedules.csiSnapshotTimeout | default "20m" }}
    excludedNamespaces:
      {{- toYaml .Values.veleroSchedules.excludedNamespaces | nindent 6 }}
    ttl: {{ .Values.veleroSchedules.weekly.ttl }}
---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: weekly-backup-local
  namespace: {{ .Values.veleroSchedules.namespace | default "velero" }}
spec:
  schedule: {{ .Values.veleroSchedules.weeklyLocal.schedule | quote }}
  template:
    csiSnapshotTimeout: {{ .Values.veleroSchedules.csiSnapshotTimeout | default "20m" }}
    storageLocation: {{ .Values.veleroSchedules.weeklyLocal.storageLocation }}
    excludedNamespaces:
      {{- toYaml .Values.veleroSchedules.excludedNamespaces | nindent 6 }}
    ttl: {{ .Values.veleroSchedules.weeklyLocal.ttl }}
{{- end }}
