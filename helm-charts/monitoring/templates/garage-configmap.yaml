{{- if .Values.garage.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/component: object-storage
data:
  garage.toml: |
    metadata_dir = "/var/lib/garage/meta"
    data_dir = "/var/lib/garage/data"
    db_engine = "sqlite"
    replication_factor = 2

    rpc_bind_addr = "[::]:3901"
    rpc_public_addr = "__HOST_IP__:3901"
    rpc_secret = "__RPC_SECRET__"

    bootstrap_peers = ["10.0.0.4:3901", "10.0.0.5:3901", "10.0.0.6:3901", "10.0.0.7:3901"]

    [s3_api]
    s3_region = "garage"
    api_bind_addr = "[::]:3900"
    {{- if .Values.garage.ingress.virtualHostedStyle }}
    # Tells Garage which DNS suffix to strip from the Host header to extract
    # the bucket name. Required for virtual-hosted-style S3 addressing
    # (e.g. ovms-models.s3.el-jefe.me -> bucket "ovms-models").
    root_domain = ".{{ .Values.garage.ingress.host }}"
    {{- end }}

    [admin]
    api_bind_addr = "[::]:3903"
    admin_token = "__ADMIN_TOKEN__"
{{- end }}
