{{- if .Values.garage.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/component: object-storage
spec:
  serviceName: garage-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: garage
      app.kubernetes.io/component: object-storage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage
        app.kubernetes.io/component: object-storage
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/garage-configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.garage.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: inject-secrets
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /etc/garage-template/garage.toml /etc/garage/garage.toml
              sed -i "s|__RPC_SECRET__|${GARAGE_RPC_SECRET}|g" /etc/garage/garage.toml
              sed -i "s|__ADMIN_TOKEN__|${GARAGE_ADMIN_TOKEN}|g" /etc/garage/garage.toml
          env:
            - name: GARAGE_RPC_SECRET
              valueFrom:
                secretKeyRef:
                  name: garage-credentials
                  key: rpcSecret
            - name: GARAGE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: garage-credentials
                  key: adminToken
          volumeMounts:
            - name: config-template
              mountPath: /etc/garage-template
            - name: config
              mountPath: /etc/garage
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
      containers:
        - name: garage
          image: "{{ .Values.garage.image.repository }}:{{ .Values.garage.image.tag }}"
          args:
            - server
          ports:
            - name: s3-api
              containerPort: 3900
              protocol: TCP
            - name: rpc
              containerPort: 3901
              protocol: TCP
            - name: admin
              containerPort: 3903
              protocol: TCP
          env:
            - name: RUST_LOG
              value: garage=info
          readinessProbe:
            httpGet:
              path: /health
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: admin
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: admin
            failureThreshold: 18
            periodSeconds: 10
          resources:
            {{- toYaml .Values.garage.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/garage
            - name: data
              mountPath: /var/lib/garage
      volumes:
        - name: config-template
          configMap:
            name: garage-config
        - name: config
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.garage.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.garage.persistence.size }}
{{- end }}
