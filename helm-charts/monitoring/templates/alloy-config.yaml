{{- if .Values.alloy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: {{ .Release.Namespace }}
data:
  config.alloy: |
    // Discover all Kubernetes pods
    discovery.kubernetes "pods" {
      role = "pod"
    }

    // Relabel to extract useful metadata
    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets

      // Keep only running pods
      rule {
        source_labels = ["__meta_kubernetes_pod_phase"]
        regex         = "Pending|Succeeded|Failed|Unknown"
        action        = "drop"
      }

      // Set namespace label
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }

      // Set pod label
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }

      // Set container label
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }

      // Set app label from pod label app or app.kubernetes.io/name
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        target_label  = "app"
        regex         = "(.+)"
      }

      // Set node label
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label  = "node"
      }
    }

    // Collect logs from Kubernetes pods
    loki.source.kubernetes "pod_logs" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.write.default.receiver]
    }

    // Push logs to Loki on ASUSTOR (centralized log aggregation over WireGuard)
    loki.write "default" {
      endpoint {
        url = "http://10.0.0.4:3100/loki/api/v1/push"
      }
    }

    // --- Mimir Remote Write (metrics sink for all scrapers) ---
    prometheus.remote_write "mimir" {
      endpoint {
        url = "http://mimir-monolithic.monitoring.svc.cluster.local:8080/api/v1/push"
        send_exemplars = true
      }
    }

    // --- Host Metrics (unix exporter) ---
    prometheus.exporter.unix "node" {
      set_collectors = ["cpu", "diskstats", "filesystem", "loadavg", "meminfo", "netdev", "uname"]
    }

    prometheus.scrape "node_metrics" {
      targets         = prometheus.exporter.unix.node.targets
      forward_to      = [prometheus.remote_write.mimir.receiver]
      scrape_interval = "30s"
    }

    // --- Systemd Journal Collection ---
    loki.source.journal "systemd" {
      forward_to = [loki.write.default.receiver]
      labels     = { job = "systemd-journal" }
    }

    // --- Blackbox Probes (VPS -> Home Network) ---
    prometheus.exporter.blackbox "home_network" {
      config = "{ modules: { icmp_probe: { prober: icmp, timeout: 5s }, http_2xx: { prober: http, timeout: 10s, http: { valid_http_versions: ['HTTP/1.1', 'HTTP/2.0'], valid_status_codes: [200, 301, 302] } }, tcp_connect: { prober: tcp, timeout: 5s } } }"

      target {
        name    = "home_icmp"
        address = "maxjeffwell@ddns.net"
        module  = "icmp_probe"
      }
      target {
        name    = "embeddings_http"
        address = "https://embeddings.el-jefe.me"
        module  = "http_2xx"
      }
      target {
        name    = "eljefe_http"
        address = "https://el-jefe.me"
        module  = "http_2xx"
      }
    }

    prometheus.scrape "blackbox" {
      targets         = prometheus.exporter.blackbox.home_network.targets
      forward_to      = [prometheus.remote_write.mimir.receiver]
      scrape_interval = "60s"
      clustering {
        enabled = true
      }
    }

    // --- Garage Metrics (S3-compatible object storage) ---
    prometheus.scrape "garage" {
      targets         = [{ "__address__" = "garage.monitoring.svc.cluster.local:3903" }]
      forward_to      = [prometheus.remote_write.mimir.receiver]
      scrape_interval = "30s"
      job_name        = "garage"
      metrics_path    = "/metrics"
    }

    // --- WireGuard Metrics (scraped from node's prometheus_wireguard_exporter) ---
    prometheus.scrape "wireguard" {
      targets         = [{ "__address__" = env("HOST_IP") + ":9586" }]
      forward_to      = [prometheus.remote_write.mimir.receiver]
      scrape_interval = "30s"
      job_name        = "wireguard"
    }

    // --- Traefik Access Log Collection ---
    local.file_match "traefik_access_log" {
      path_targets = [{ "__path__" = "/var/log/traefik/access.log" }]
      sync_period  = "5s"
    }

    loki.source.file "traefik_access_log" {
      targets    = local.file_match.traefik_access_log.targets
      forward_to = [loki.process.traefik.receiver]
    }

    loki.process "traefik" {
      // Parse Traefik common log format:
      // <ip> - - [<ts>] "<method> <path> <proto>" <status> <size> "<referer>" "<ua>" <count> "<router>" "<backend>" <duration>
      stage.regex {
        expression = "^(?P<client_ip>[\\d.]+) - - \\[(?P<timestamp>[^\\]]+)\\] \"(?P<method>\\S+) (?P<path>\\S+) [^\"]+\" (?P<status>\\d+) \\d+ \"(?P<referer>[^\"]*)\" \"(?P<user_agent>[^\"]*)\" \\d+ \"(?P<router>[^\"]*)\" \"[^\"]*\" (?P<duration>\\S+)"
      }

      // Promote to labels for Grafana queries
      stage.labels {
        values = {
          status     = "",
          method     = "",
          path       = "",
          referer    = "",
          user_agent = "",
          router     = "",
        }
      }

      // Static label to identify these as traefik access logs
      stage.static_labels {
        values = { job = "traefik-access-log", source = "traefik" }
      }

      forward_to = [loki.write.default.receiver]
    }

    // --- eBPF CPU Profiler (Pyroscope) ---
    discovery.kubernetes "local_pods" {
      selectors {
        field = "spec.nodeName=" + env("HOSTNAME")
        role  = "pod"
      }
      role = "pod"
    }

    pyroscope.ebpf "instance" {
      forward_to = [pyroscope.write.endpoint.receiver]
      targets    = discovery.kubernetes.local_pods.targets
    }

    pyroscope.write "endpoint" {
      endpoint {
        url = "http://pyroscope.monitoring.svc.cluster.local:4040"
      }
    }

    // --- Pyroscope SDK Receiver (for app-instrumented profiles) ---
    pyroscope.receive_http "default" {
      http {
        listen_address = "0.0.0.0"
        listen_port    = 9999
      }
      forward_to = [pyroscope.write.endpoint.receiver]
    }

    // --- Pyroscope Self-Profiling (pprof scrape) ---
    pyroscope.scrape "pyroscope_self" {
      targets = [
        { "__address__" = "pyroscope.monitoring.svc.cluster.local:4040", "service_name" = "pyroscope" },
      ]
      forward_to = [pyroscope.write.endpoint.receiver]
      clustering {
        enabled = true
      }
      profiling_config {
        profile.process_cpu { enabled = false }
      }
    }

    // --- Faro Frontend Observability Receiver ---
    faro.receiver "default" {
      server {
        listen_address = "0.0.0.0"
        listen_port    = 12347
        cors_allowed_origins = [
          "https://bookmarked-k8s.el-jefe.me",
          "https://el-jefe.me",
          "https://www.el-jefe.me",
          "https://educationelly-k8s.el-jefe.me",
          "https://educationelly-graphql-k8s.el-jefe.me",
          "https://intervalai-k8s.el-jefe.me",
          "https://code-talk-k8s.el-jefe.me",
          "https://firebook-k8s.el-jefe.me",
          "https://showcase.el-jefe.me",
          "http://localhost:3000",
        ]
        max_allowed_payload_size = "5MiB"
      }
      output {
        logs   = [loki.write.default.receiver]
        traces = [otelcol.processor.batch.tempo.input]
      }
    }

    // --- Beyla eBPF Auto-Instrumentation ---
    beyla.ebpf "auto" {
      discovery {
        instrument {
          kubernetes {
            namespace = "default"
          }
        }
      }
      output {
        traces = [otelcol.processor.batch.tempo.input]
      }
    }

    // --- OTLP Receiver (for future SDK-instrumented apps) ---
    otelcol.receiver.otlp "default" {
      grpc {
        endpoint = "0.0.0.0:4317"
      }
      http {
        endpoint = "0.0.0.0:4318"
      }
      output {
        traces = [otelcol.processor.batch.tempo.input]
      }
    }

    // --- Batch spans before export ---
    otelcol.processor.batch "tempo" {
      timeout             = "5s"
      send_batch_size     = 1024
      send_batch_max_size = 0
      output {
        traces = [otelcol.exporter.otlp.tempo.input]
      }
    }

    // --- Export to Tempo ---
    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "tempo-monolithic.monitoring.svc.cluster.local:4317"
        tls {
          insecure = true
        }
        compression = "snappy"
      }
    }
{{- end }}
