apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-xray-external
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: xray
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - port: 443
      protocol: TCP
  egress:
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    # No ports restriction to allow all traffic (it is a proxy after all)
