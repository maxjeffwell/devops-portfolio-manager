# Static NFS PV for ASUSTOR /volume1/TV Shows (read-only).
# NFS server side has the path quoted in /etc/exports as "/volume1/TV Shows"
# (NFS path quoting via double quotes for paths with spaces — backslash escapes
# don't work in /etc/exports). The mount client receives the literal path.
# Capacity is metadata-only; set to 2Ti as nominal headroom (current usage ~365 GB).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-media-tvshows
  labels:
    app: jellyfin
    media: tvshows
spec:
  capacity:
    storage: 2Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - ro
    - nfsvers=4.1
    - hard
    - nconnect=4
    - port=2050
  nfs:
    # ganesha v6.1 on ASUSTOR (docker, port 2050). FSAL_VFS to /volume1/TV Shows
    # exposed via pseudo path /TVShows (ganesha pseudo-fs strips the volume1
    # prefix and spaces). eth1 (.133) — onboard 2.5GbE @ MTU 9000 (each PV gets
    # its own NIC). Kernel nfsd removed from this path 2026-05-26.
    server: 192.168.50.133
    path: /TVShows
