# Velero Backup Schedules
veleroSchedules:
  enabled: true
  namespace: velero
  excludedNamespaces:
    - gpu-operator
  daily:
    schedule: "0 2 * * *"
    ttl: 168h0m0s
  weekly:
    schedule: "0 3 * * 0"
    ttl: 720h0m0s
  weeklyLocal:
    schedule: "0 3 * * 0"
    ttl: 720h0m0s
    storageLocation: local

# Velero Backup Alerts
veleroAlerts:
  enabled: true
  namespace: velero

# Velero Backup Verification (weekly restore test)
veleroBackupVerify:
  enabled: true
  # Run weekly on Sundays at 4 AM UTC
  schedule: "0 4 * * 0"

# Gotify Bridge (AlertManager → Gotify notification relay)
gotifyBridge:
  enabled: true
  image:
    repository: ghcr.io/druggeri/alertmanager_gotify_bridge
    tag: "2.3.2"
  gotifyEndpoint: "http://gotify.monitoring.svc.cluster.local"
  tokenSecret:
    name: gotify-alertmanager-token
    key: gotify-token
  defaultPriority: "5"
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      memory: 64Mi
  serviceMonitor:
    enabled: true

# Tempo Monolithic - Distributed tracing (single binary, OTLP receiver + S3 storage)
# Design: docs/plans/2026-03-10-grafana-tempo-design.md
tempoMonolithic:
  enabled: true
  image:
    repository: grafana/tempo
    tag: "2.7.2"
  priorityClassName: monitoring
  nodeSelector:
    kubernetes.io/hostname: vmi2951245
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi
  persistence:
    storageClass: local-path
    size: 20Gi
  storage:
    credentialsSecret: garage-tempo-credentials
    s3:
      endpoint: 10.0.0.1:3900
      bucket: tempo-traces
      insecure: true
      region: garage
  config:
    retention: 720h
    ingester:
      flushCheckPeriod: 30s
      maxBlockDuration: 30m
    compactor:
      compactionWindow: 4h
    metricsGenerator:
      remoteWriteUrl: http://mimir-monolithic.monitoring.svc.cluster.local:8080/api/v1/push
  redis:
    address: tempo-redis.monitoring.svc.cluster.local:6379
    cacheMinCompactionLevel: 1
    cacheMaxBlockAge: 48h
  serviceMonitor:
    enabled: true

# Tempo Redis - Bloom filter and index header cache (no persistence, rebuilt from S3)
tempoRedis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  nodeSelector:
    kubernetes.io/hostname: vmi2951245
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 2Gi
  maxmemory: 2gb
  maxmemoryPolicy: allkeys-lru

# Pyroscope - Continuous profiling (monolithic mode, Garage S3 backend)
pyroscope:
  enabled: true
  image:
    repository: grafana/pyroscope
    tag: "1.18.1"
  priorityClassName: monitoring
  nodeSelector:
    kubernetes.io/hostname: vmi2951245
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi
  persistence:
    storageClass: local-path
    size: 20Gi
  storage:
    credentialsSecret: garage-pyroscope-credentials
    s3:
      endpoint: 10.0.0.1:3900
      bucket: pyroscope-profiles
      insecure: true
      region: garage
  serviceMonitor:
    enabled: true

# Custom Ingress Configuration (separate from kube-prometheus-stack ingress)
ingress:
  enabled: true
  grafanaHost: grafana.el-jefe.me
  grafanaService: prometheus-grafana
  grafanaPort: 80
  prometheusHost: prometheus.el-jefe.me
  prometheusService: prometheus-kube-prometheus-prometheus
  prometheusPort: 9090

# Kube-Prometheus-Stack Configuration
kube-prometheus-stack:
  # Prometheus Configuration
  prometheus:
    prometheusSpec:
      # Number of replicas
      replicas: 1
      # Retention period for metrics
      retention: 15d
      # Node selector - run on VPS to ensure network access to all targets
      nodeSelector:
        kubernetes.io/hostname: vmi2951245
      # Storage configuration
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      # Resource limits
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 4Gi
      # Config-reloader sidecar and init container resources (required by monitoring-quota)
      containers:
        - name: config-reloader
          resources:
            requests:
              cpu: 10m
              memory: 25Mi
            limits:
              memory: 50Mi
      initContainers:
        - name: init-config-reloader
          resources:
            requests:
              cpu: 10m
              memory: 25Mi
            limits:
              memory: 50Mi
      # Remote write to Mimir for long-term metric storage
      remoteWrite:
        - url: http://mimir-monolithic.monitoring.svc.cluster.local:8080/api/v1/push
          name: mimir
          remoteTimeout: 30s
          writeRelabelConfigs:
            # Drop high-cardinality apiserver request/watch metrics
            - sourceLabels: [__name__]
              regex: "apiserver_request_duration_seconds_bucket|apiserver_request_body_size_bytes_bucket|apiserver_response_body_size_bytes_bucket|apiserver_watch_events_sizes_bucket"
              action: drop
      # Service monitors for scraping application metrics
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false

    # Disable kube-prometheus-stack's built-in ingress (we use a custom Traefik ingress in templates/ingress.yaml)
    ingress:
      enabled: false

  # Grafana Configuration
  # ⚠️  SECURITY: Override adminPassword at deploy time!
  # helm install monitoring . --set kube-prometheus-stack.grafana.adminPassword="$(openssl rand -base64 24)"
  grafana:
    enabled: true
    adminPassword: "REPLACE_AT_DEPLOY_TIME"

    persistence:
      enabled: true
      storageClassName: asustor-nfs
      size: 5Gi

    # init-chown-data is added by the chart when persistence is enabled.
    # monitoring-quota requires resource specs on all containers.
    initChownData:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi

    # Disable kube-prometheus-stack's built-in ingress (we use a custom Traefik ingress in templates/ingress.yaml)
    ingress:
      enabled: false

    # Configure Grafana for subdomain routing (grafana.el-jefe.me)
    grafana.ini:
      server:
        domain: grafana.el-jefe.me
        root_url: "https://grafana.el-jefe.me/"
        serve_from_sub_path: false
      plugins:
        allow_loading_unsigned_plugins: k8s-app


    # Plugins
    plugins:
      - grafana-polystat-panel
      - yesoreyeram-infinity-datasource 3.7.1
      - marcusolsson-treemap-panel

    # Init container to install URL-based plugins not in the Grafana catalog
    extraInitContainers:
      - name: install-k8s-plugin
        image: busybox:1.36
        command:
          - /bin/sh
          - -c
          - |
            if [ -d /var/lib/grafana/plugins/tiithansen-grafana-k8s-app/dist ]; then
              echo "k8s-app plugin already installed, skipping"
              exit 0
            fi
            wget -O /tmp/k8s-app.zip https://github.com/tiithansen/grafana-k8s-app/releases/download/v0.11.2/grafana-k8s-app-v0.11.2.zip &&
            mkdir -p /var/lib/grafana/plugins/tiithansen-grafana-k8s-app &&
            unzip -o /tmp/k8s-app.zip -d /var/lib/grafana/plugins/tiithansen-grafana-k8s-app &&
            rm /tmp/k8s-app.zip
        volumeMounts:
          - name: storage
            mountPath: /var/lib/grafana
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi

    # Additional data sources for Loki and Mimir
    additionalDataSources:
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://10.0.0.4:3100
        editable: true
      - name: Mimir
        type: prometheus
        uid: mimir
        access: proxy
        url: http://mimir-monolithic.monitoring.svc.cluster.local:8080/prometheus
        editable: true
        isDefault: true
        jsonData:
          exemplarTraceIdDestinations:
            - datasourceUid: tempo
              name: trace_id
            - datasourceUid: pyroscope
              name: profile_id
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo-monolithic.monitoring.svc.cluster.local:3200
        editable: true
        isDefault: false
        jsonData:
          streamingEnabled:
            search: false
          tracesToLogs:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: true
          tracesToMetrics:
            datasourceUid: mimir
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: mimir
          tracesToProfiles:
            datasourceUid: pyroscope
            tags:
              - service.name
              - job
      - name: Pyroscope
        type: grafana-pyroscope-datasource
        uid: pyroscope
        access: proxy
        url: http://pyroscope.monitoring.svc.cluster.local:4040
        editable: true
        isDefault: false

    # Liveness probe tuning — Grafana startup may take several minutes on first
    # init (SQLite migrations). Subsequent starts with persistent storage are faster.
    livenessProbe:
      httpGet:
        path: /api/health
        port: 3000
      initialDelaySeconds: 300
      timeoutSeconds: 30
      failureThreshold: 15
      periodSeconds: 10

    readinessProbe:
      httpGet:
        path: /api/health
        port: 3000
      initialDelaySeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      periodSeconds: 10

    # Resource limits
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # Grafana sidecar resources (required by monitoring-quota)
    sidecar:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi
      datasources:
        enabled: true
        defaultDatasourceEnabled: false

    # Priority class
    priorityClassName: monitoring

    # Default dashboards
    defaultDashboardsEnabled: true
    defaultDashboardsTimezone: UTC

  # AlertManager Configuration
  alertmanager:
    enabled: true
    config:
      global:
        resolve_timeout: 5m
      inhibit_rules:
        - equal: ['namespace', 'alertname']
          source_matchers:
            - severity = critical
          target_matchers:
            - severity =~ warning|info
        - equal: ['namespace', 'alertname']
          source_matchers:
            - severity = warning
          target_matchers:
            - severity = info
        - equal: ['namespace']
          source_matchers:
            - alertname = InfoInhibitor
          target_matchers:
            - severity = info
        - target_matchers:
            - alertname = InfoInhibitor
      receivers:
        - name: 'null'
        - name: 'gotify'
          webhook_configs:
            - url: 'http://alertmanager-gotify-bridge.monitoring.svc.cluster.local:8080/gotify_webhook'
              send_resolved: true
      route:
        group_by: ['namespace']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: 'null'
        routes:
          # Silence Watchdog (always-firing health check)
          - matchers:
              - alertname = "Watchdog"
            receiver: 'null'
          # Silence GPU operator DaemonSet false-positives only
          - matchers:
              - namespace = "gpu-operator"
              - alertname =~ "KubeDaemonSetMisScheduled|KubeDaemonSetRolloutStuck"
            receiver: 'null'
          # Silence k3s control plane alerts (bundled into k3s binary)
          - matchers:
              - alertname =~ "KubeControllerManagerDown|KubeSchedulerDown|KubeProxyDown"
            receiver: 'null'
          # Route critical alerts to Gotify
          - matchers:
              - severity = "critical"
            receiver: 'gotify'
          # Route warning alerts to Gotify
          - matchers:
              - severity = "warning"
            receiver: 'gotify'
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 2Gi
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      containers:
        - name: config-reloader
          resources:
            requests:
              cpu: 10m
              memory: 25Mi
            limits:
              memory: 50Mi
        - name: init-config-reloader
          resources:
            requests:
              cpu: 10m
              memory: 25Mi
            limits:
              memory: 50Mi

    # Disable kube-prometheus-stack's built-in ingress (we use a custom Traefik ingress in templates/ingress.yaml)
    ingress:
      enabled: false

  # Node Exporter - collect node-level metrics
  nodeExporter:
    enabled: true
  prometheus-node-exporter:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi

  # Kube State Metrics - collect Kubernetes object metrics
  kubeStateMetrics:
    enabled: true

  # kube-state-metrics sub-chart overrides
  # The /livez endpoint returns 503 when informer cache falls behind under API server load
  kube-state-metrics:
    nodeSelector:
      kubernetes.io/hostname: vmi2951245
    livenessProbe:
      failureThreshold: 10
      periodSeconds: 15
    readinessProbe:
      failureThreshold: 10
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # Prometheus Operator
  prometheusOperator:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    admissionWebhooks:
      patch:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi

# MinIO - DISABLED (replaced by Garage March 2026)
minio:
  enabled: false
  mode: standalone
  replicas: 1
  existingSecret: minio-credentials
  persistence:
    enabled: true
    storageClass: local-path
    size: 20Gi
  nodeSelector:
    kubernetes.io/hostname: vmi2951245
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  # Resources for MinIO post-install/post-upgrade hook jobs (bucket creation)
  # Required by monitoring-quota ResourceQuota
  makeBucketJob:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
  makeUserJob:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
  # Auto-create buckets for Loki and Mimir
  buckets:
    - name: loki-chunks
      policy: none
      purge: false
    - name: loki-ruler
      policy: none
      purge: false
    - name: mimir-blocks
      policy: none
      purge: false
    - name: mimir-ruler
      policy: none
      purge: false
    - name: mimir-alertmanager
      policy: none
      purge: false
  metrics:
    serviceMonitor:
      enabled: true

# Garage - Lightweight S3-compatible object storage (replaces MinIO)
garage:
  enabled: true
  image:
    repository: dxflrs/garage
    tag: "v2.2.0"
  nodeSelector:
    kubernetes.io/hostname: vmi2951245
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  persistence:
    storageClass: local-path
    size: 80Gi
  buckets:
    - mimir-blocks
    - mimir-ruler
    - mimir-alertmanager
    - tempo-traces
    - pyroscope-profiles
    - velero

# Loki - DISABLED (replaced by ASUSTOR Loki with Garage S3 backend)
loki:
  enabled: false
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    storage:
      type: s3
      s3:
        endpoint: http://prometheus-minio.monitoring.svc.cluster.local:9000
        bucketnames: loki-chunks
        region: us-east-1
        access_key_id: ${rootUser}
        secret_access_key: ${rootPassword}
        insecure: true
        s3forcepathstyle: true
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
    limits_config:
      retention_period: 360h
    compactor:
      retention_enabled: true
      delete_request_store: filesystem
      working_directory: /var/loki/compactor
    rulerConfig:
      storage:
        type: s3
        s3:
          endpoint: http://prometheus-minio.monitoring.svc.cluster.local:9000
          bucketnames: loki-ruler
          region: us-east-1
          access_key_id: ${MINIO_ROOT_USER}
          secret_access_key: ${MINIO_ROOT_PASSWORD}
          insecure: true
          s3forcepathstyle: true
  singleBinary:
    replicas: 1
    nodeSelector:
      kubernetes.io/hostname: vmi2951245
    persistence:
      storageClass: local-path
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    extraEnvFrom:
      - secretRef:
          name: minio-credentials
    extraArgs:
      - -config.expand-env=true
  # Right-sized cache resources (chart defaults are 500m/9.8Gi and 500m/1.2Gi)
  chunksCache:
    allocatedMemory: 256
    resources:
      requests:
        cpu: 50m
        memory: 384Mi
      limits:
        cpu: 200m
        memory: 512Mi
  resultsCache:
    allocatedMemory: 128
    resources:
      requests:
        cpu: 50m
        memory: 192Mi
      limits:
        cpu: 200m
        memory: 256Mi
  # Disable components not needed in single-binary mode
  gateway:
    enabled: false
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  # Loki sidecar (rules watcher) resources
  sidecar:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
  # Loki canary resources (required by monitoring-quota)
  lokiCanary:
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        memory: 32Mi
  # Memcached exporter sidecar resources
  memcachedExporter:
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        memory: 32Mi
  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
    lokiCanary:
      enabled: false

# Alloy - Log collector (DaemonSet on all nodes)
alloy:
  enabled: true
  alloy:
    clustering:
      enabled: true
    securityContext:
      privileged: true
    configMap:
      create: false
      name: alloy-config
      key: config.alloy
    mounts:
      varlog: true
      dockercontainers: true
      extra:
        - name: journal
          mountPath: /var/log/journal
          readOnly: true
        - name: debugfs
          mountPath: /sys/kernel/debug
          readOnly: true
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
      - name: pyroscope-http
        port: 9999
        targetPort: 9999
        protocol: TCP
      - name: faro
        port: 12347
        targetPort: 12347
        protocol: TCP
    extraEnv:
      - name: GOMEMLIMIT
        value: "1800MiB"
      - name: HOST_IP
        valueFrom:
          fieldRef:
            fieldPath: status.hostIP
    resources:
      requests:
        cpu: 50m
        memory: 512Mi
      limits:
        memory: 2Gi
  configReloader:
    resources:
      requests:
        cpu: 10m
        memory: 25Mi
      limits:
        memory: 50Mi
  controller:
    type: daemonset
    hostPID: true
    priorityClassName: monitoring
    tolerations:
      - key: workload
        value: gpu
        effect: NoSchedule
    volumes:
      extra:
        - name: journal
          hostPath:
            path: /var/log/journal
            type: DirectoryOrCreate
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
            type: Directory
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
      - name: pyroscope-http
        port: 9999
        targetPort: 9999
        protocol: TCP

# Perimeter Audit - nmap scan of home network from VPS
perimeterAudit:
  enabled: true
  schedule: "0 */6 * * *"
  ddnsHostname: "maxjeffwell.ddns.net"

# Network Quality - speedtest + traceroute to home network
networkQuality:
  enabled: true
  schedule: "*/30 * * * *"
  ddnsHostname: "maxjeffwell.ddns.net"

# CrowdSec Log Processor - parses Traefik access logs and sends alerts to LAPI
crowdsec:
  logProcessor:
    enabled: true
    image:
      repository: crowdsecurity/crowdsec
      tag: "v1.7.6"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    serviceMonitor:
      enabled: true

# Mimir Distributed - DISABLED (replaced by monolithic deployment below)
mimir-distributed:
  enabled: false

# Mimir Monolithic - Long-term metric storage (single binary, all components in one pod)
# S3 backend: Garage (replaced MinIO March 2026)
mimirMonolithic:
  enabled: true
  image:
    repository: grafana/mimir
    tag: "3.0.1"
  priorityClassName: monitoring
  nodeSelector:
    kubernetes.io/hostname: vmi2951245
  # Combined resources for all Mimir components in a single process
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 4Gi
  persistence:
    storageClass: local-path
    size: 20Gi
  storage:
    credentialsSecret: garage-mimir-credentials
    s3:
      endpoint: 10.0.0.1:3900
      insecure: true
    buckets:
      blocks: mimir-blocks
      ruler: mimir-ruler
      alertmanager: mimir-alertmanager
  config:
    compactor:
      compactionInterval: 30m
    limits:
      maxGlobalSeriesPerUser: 500000
      ingestionRate: 100000
      ingestionBurstSize: 2000000
      compactorBlocksRetentionPeriod: 2160h
      maxGlobalExemplarsPerUser: 100000
      outOfOrderTimeWindow: 5m
  serviceMonitor:
    enabled: true
