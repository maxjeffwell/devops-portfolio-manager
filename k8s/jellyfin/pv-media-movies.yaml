# Static NFS PV for ASUSTOR /volume1/Movies (read-only).
# Capacity is metadata-only for static NFS PVs (not enforced by NFS or kubelet) —
# it only governs PVC-binding eligibility. Set to 2Ti as a nominal headroom (current
# usage ~266 GB; ASUSTOR /volume1 total is 3.6 TB).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-media-movies
  labels:
    app: jellyfin
    media: movies
spec:
  capacity:
    storage: 2Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - ro
    - nfsvers=4.1
    - hard
    - nconnect=4
    - port=2050
  nfs:
    # ganesha v6.1 on ASUSTOR (docker, port 2050). FSAL_VFS to /volume1/Movies
    # exposed via pseudo path /Movies. Kernel nfsd was removed from this path
    # to resolve the FSAL_VFS+kernel-export referral-attr conflict (2026-05-26).
    server: 192.168.50.149
    path: /Movies
