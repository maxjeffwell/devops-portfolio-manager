# Static NFS PV for ASUSTOR /volume2/Recordings (read-WRITE) — Jellyfin DVR target.
# Separate pool from the media library (which is /volume1) so DVR writes don't
# compete with library reads.
#
# IMPORTANT — export persistence: this path was published at runtime via
#   exportfs -o rw,no_subtree_check,insecure 192.168.50.0/24:/volume2/Recordings
# on the ASUSTOR (ADM's per-folder NFS GUI would not apply to it). That ad-hoc
# export does NOT survive an ASUSTOR reboot or an ADM-triggered `exportfs -ra`.
# Make it durable (ADM Shared Folder export, or a boot task) before relying on it.
#
# Server pinned to 192.168.50.133 (eth1) to match the media PVs. Capacity is
# metadata-only for static NFS PVs (binding eligibility only, not enforced).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-recordings
  labels:
    app: jellyfin
    media: recordings
spec:
  capacity:
    storage: 2Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - rw
    - vers=3
    - nolock
    - hard
    - nconnect=4
  nfs:
    server: 192.168.50.133
    path: /volume2/Recordings
