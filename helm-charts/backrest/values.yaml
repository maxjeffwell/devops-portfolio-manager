replicaCount: 1

strategy:
  type: Recreate

image:
  repository: garethgeorge/backrest
  tag: v1.12.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9898
  targetPort: 9898

ingress:
  enabled: true

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - vmi3115606

env:
  - name: BACKREST_PORT
    value: ":9898"
  - name: BACKREST_DATA
    value: "/data"
  - name: BACKREST_CONFIG
    value: "/config/config.json"
  - name: XDG_CACHE_HOME
    value: "/cache"
  - name: TZ
    value: "America/New_York"

persistence:
  data:
    enabled: true
    existingClaim: backrest-data-v2
    mountPath: /data
  config:
    enabled: true
    existingClaim: backrest-config-v2
    mountPath: /config
  cache:
    enabled: true
    existingClaim: backrest-cache-v2
    mountPath: /cache
  backups:
    enabled: true
    existingClaim: backrest-backups-v2
    mountPath: /velero-backups

hostPaths:
  - name: iscsi-worker
    path: /mnt/iscsi
    mountPath: /mnt/iscsi
    readOnly: true
  - name: k3s-state
    path: /home/maxjeffwell/k3s-state-backups
    mountPath: /k3s-state
    readOnly: true

sshSecret:
  enabled: true
  name: backrest-ssh-key

startupProbe:
  httpGet:
    path: /
    port: 9898
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 12

livenessProbe:
  httpGet:
    path: /
    port: 9898
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 9898
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
