# DVR data dir (Database/, Images/, Logs/, Streaming/ live-TV buffers).
# local-path on debian-marmoset's root NVMe (~219G free). NOT openebs-lvmpv:
# the node's openebs-vg has VFree=0 (the thinpool consumed the whole VG), so
# lvm-localpv publishes CSIStorageCapacity=0 there and the scheduler rejects
# any new lvmpv claim on this node. local-path enforces no quota — the size
# below is nominal. Recordings do NOT go here — /recordings is a second
# local-path PVC added as an extra disk in the Channels UI.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: channels-dvr-data
  namespace: channels-dvr
  labels:
    app: channels-dvr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 15Gi
