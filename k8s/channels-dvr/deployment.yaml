# Channels DVR WARM STANDBY for the primary on the ASUSTOR (192.168.50.142:8089).
# Pinned to debian-marmoset: TVE (Spectrum) authenticates against the home
# egress IP, so this can never run on the cloud nodes.
#
# Pod network + container hostPort 8089: LAN clients still reach it at
# 192.168.50.152:8089 (tailnet: 100.64.0.12:8089) because portmap binds the
# node port and DNATs to the pod — but unlike hostNetwork, traffic traverses
# the pod veth so networkpolicy.yaml is actually enforced. Trade-off: no
# bonjour/mDNS discovery; Channels clients add the server by ip:port manually.
#
# Upstream docker docs use --net=host purely for Bonjour client discovery;
# we trade that for an enforceable NetworkPolicy (see networkpolicy.yaml) —
# clients add the server manually as 192.168.50.152:8089.
#
# Standby discipline: same sources configured, recording passes DISABLED.
# Both servers share the same Spectrum TVE ~3-stream cap (enforced at the
# provider by egress IP, not per server). On primary failure: restore the
# newest /channels-dvr/primary-db-backups snapshot via the UI, enable passes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: channels-dvr
  namespace: channels-dvr
  labels:
    app: channels-dvr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: channels-dvr
  template:
    metadata:
      labels:
        app: channels-dvr
    spec:
      nodeSelector:
        kubernetes.io/hostname: debian-marmoset
      containers:
        - name: channels-dvr
          # :tve, not :latest — the default image is Alpine WITHOUT Chrome;
          # TV Everywhere login drives a headless Chrome server-side, so the
          # Spectrum TVE source only works on the Debian-based tve variant.
          image: fancybits/channels-dvr:tve
          env:
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: 8089
              hostPort: 8089
              name: http
          volumeMounts:
            - name: data
              mountPath: /channels-dvr
            - name: recordings
              # /shares/DVR is the path the image's setup UI offers by default
              mountPath: /shares/DVR
            - name: primary
              mountPath: /primary
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              gpu.intel.com/i915: "1"
            limits:
              memory: 4Gi
              gpu.intel.com/i915: "1"
          readinessProbe:
            tcpSocket:
              port: 8089
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8089
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: channels-dvr-data
        - name: recordings
          persistentVolumeClaim:
            claimName: channels-dvr-recordings
        - name: primary
          persistentVolumeClaim:
            claimName: channels-dvr-primary-data
            readOnly: true
