apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: vaultwarden
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      # debian-marmoset: co-located with the CNPG DB, reaches B2 (for Velero
      # offsite of /data), and runs the Velero node-agent. vmi2951245 was
      # rejected — no outbound route to Backblaze B2.
      nodeSelector:
        kubernetes.io/hostname: debian-marmoset
      initContainers:
        - name: wait-for-db
          image: ghcr.io/cloudnative-pg/postgresql:17
          command:
            - sh
            - -c
            - 'until pg_isready -h cnpg-vaultwarden-rw -p 5432; do echo "waiting for db"; sleep 3; done'
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: vaultwarden
          image: vaultwarden/server:1.36.0-alpine
          ports:
            - containerPort: 80
          env:
            - name: DOMAIN
              value: "https://vaultwarden.el-jefe.me"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cnpg-vaultwarden-app
                  key: uri
            - name: SIGNUPS_ALLOWED
              value: "false"
            - name: INVITATIONS_ALLOWED
              value: "true"
            - name: ENABLE_WEBSOCKET
              value: "true"
            - name: SHOW_PASSWORD_HINT
              value: "false"
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: ADMIN_TOKEN
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-data
