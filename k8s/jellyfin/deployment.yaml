apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
  labels:
    app: jellyfin
    portfolio: "true"
spec:
  replicas: 1
  strategy:
    # Recreate avoids RWO PVC dual-attach during rollouts.
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
        portfolio: "true"
    spec:
      nodeSelector:
        gpu-node: "true"
      priorityClassName: portfolio-critical
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Recover encoding.xml if it's missing or corrupt.
        # 2026-05-24 — covers the failure mode where Jellyfin fails to deserialize
        # encoding.xml at startup ("error in XML document (1, 1)") and falls back
        # to defaults (HardwareAccelerationType=none), silently disabling HW accel.
        # Only writes when file is missing or invalid; user UI edits are preserved.
        - name: ensure-encoding-config
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              TARGET=/config/config/encoding.xml
              mkdir -p /config/config
              if [ ! -s "$TARGET" ] || ! grep -q '</EncodingOptions>' "$TARGET" 2>/dev/null; then
                echo "Restoring encoding.xml from ConfigMap (missing or corrupt)"
                cp /default/encoding.xml "$TARGET"
              else
                echo "encoding.xml is present and well-formed; leaving alone"
              fi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - { name: config, mountPath: /config }
            - { name: encoding-defaults, mountPath: /default, readOnly: true }
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:10.10.7
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8096
              protocol: TCP
          env:
            - { name: TZ,  value: America/New_York }
            - { name: PUID, value: "1000" }
            - { name: PGID, value: "1000" }
            - { name: JELLYFIN_PublishedServerUrl,                value: https://jellyfin-k8s.el-jefe.me }
            - { name: JELLYFIN_FFmpeg__transcoding_temp_path,     value: /transcodes }
            # Jellyfin uses default SQLite backend (jellyfin.db in /config).
            # PG attempt was abandoned in Phase 5 — JELLYFIN_DATABASE_* env vars
            # weren't honored (Jellyfin uses .NET-style JELLYFIN__... binding) AND
            # PG buys nothing meaningful for this single-process workload.
          resources:
            requests:
              cpu: "1"
              # Idle/playback uses ~320Mi; 1Gi reserves baseline + transcode
              # buffer headroom. Burst to limit during heavy transcoding is
              # still permitted.
              memory: 1Gi
              gpu.intel.com/i915: "1"
            limits:
              memory: 6Gi
              gpu.intel.com/i915: "1"
          volumeMounts:
            - { name: config,        mountPath: /config }
            - { name: cache,         mountPath: /cache }
            - { name: transcodes,    mountPath: /transcodes }
            - { name: media-movies,  mountPath: /media/movies,  readOnly: true }
            - { name: media-tvshows, mountPath: /media/tvshows, readOnly: true }
            - { name: tmp,           mountPath: /tmp }
            - { name: run,           mountPath: /var/run }
          livenessProbe:
            httpGet: { path: /health, port: 8096 }
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet: { path: /health, port: 8096 }
            periodSeconds: 10
          startupProbe:
            # 5min budget for first PG schema migration on cold start.
            httpGet: { path: /health, port: 8096 }
            periodSeconds: 10
            failureThreshold: 30
      volumes:
        - { name: config,        persistentVolumeClaim: { claimName: jellyfin-config } }
        - { name: cache,         persistentVolumeClaim: { claimName: jellyfin-cache } }
        - { name: media-movies,  persistentVolumeClaim: { claimName: jellyfin-media-movies } }
        - { name: media-tvshows, persistentVolumeClaim: { claimName: jellyfin-media-tvshows } }
        - name: transcodes
          # tmpfs in RAM — zero NVMe wear from transcode segments. 6Gi cap.
          emptyDir:
            medium: Memory
            sizeLimit: 6Gi
        - { name: tmp, emptyDir: { sizeLimit: 256Mi } }
        - { name: run, emptyDir: { sizeLimit: 64Mi } }
        - name: encoding-defaults
          configMap:
            name: jellyfin-encoding-defaults
