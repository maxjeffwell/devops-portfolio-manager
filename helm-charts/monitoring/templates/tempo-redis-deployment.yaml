{{- if .Values.tempoRedis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo-redis
  labels:
    app.kubernetes.io/name: tempo-redis
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tempo-redis
      app.kubernetes.io/component: cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tempo-redis
        app.kubernetes.io/component: cache
    spec:
      {{- with .Values.tempoRedis.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: "{{ .Values.tempoRedis.image.repository }}:{{ .Values.tempoRedis.image.tag }}"
          imagePullPolicy: IfNotPresent
          args:
            - --maxmemory
            - {{ .Values.tempoRedis.maxmemory }}
            - --maxmemory-policy
            - {{ .Values.tempoRedis.maxmemoryPolicy }}
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.tempoRedis.resources | nindent 12 }}
{{- end }}
