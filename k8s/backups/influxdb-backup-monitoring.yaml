apiVersion: batch/v1
kind: CronJob
metadata:
  name: influxdb-backup
  namespace: monitoring
  labels:
    app: influxdb-backup
spec:
  schedule: "0 4 * * *"
  # Forbid prevents a hung run from spawning a daily pileup of overlapping pods.
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      # Auto-reap finished jobs so they don't accumulate in the namespace.
      ttlSecondsAfterFinished: 3600
      # A normal backup completes in well under 2 min. 30 min is generous headroom;
      # if a run hangs (e.g. apk/network stall) it self-terminates instead of
      # living for weeks as a zombie.
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: influxdb-backup
            portfolio: "true"
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          containers:
          - name: backup
            # Prebuilt image with influx + aws CLIs baked in (no runtime apk).
            # Built from docker/influxdb-backup/Dockerfile.
            image: maxjeffwell/influxdb-backup:2.7
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - |
              set -e
              # influx + aws CLIs are baked into the image at build time
              # (docker/influxdb-backup/Dockerfile) — no runtime dependency
              # install, so a CDN/network blip can never hang the job.

              BACKUP_DATE=$(date +%Y%m%d-%H%M%S)
              BACKUP_DIR=/tmp/backup-$BACKUP_DATE
              ARCHIVE=/tmp/influxdb-monitoring-$BACKUP_DATE.tar.gz

              echo "[$(date)] Starting InfluxDB backup..."
              influx backup "$BACKUP_DIR" \
                --host http://influxdb.monitoring.svc.cluster.local:8086 \
                -t "$INFLUX_TOKEN"

              echo "[$(date)] Creating archive..."
              tar czf "$ARCHIVE" -C "$BACKUP_DIR" .

              FILESIZE=$(stat -c%s "$ARCHIVE" 2>/dev/null || stat -f%z "$ARCHIVE")
              echo "[$(date)] Archive size: $FILESIZE bytes"

              echo "[$(date)] Uploading to Garage S3..."
              aws s3 cp "$ARCHIVE" "s3://influxdb-backups/monitoring/$BACKUP_DATE.tar.gz" \
                --endpoint-url "$B2_ENDPOINT"

              echo "[$(date)] Backup complete: $BACKUP_DATE ($FILESIZE bytes)"

              # Retention: delete monitoring backups older than 30 days.
              # Epoch arithmetic — BusyBox 'date' (this alpine image) has no GNU
              # '-d "-30 days"'. 2592000 = 30 days in seconds.
              CUTOFF_DATE=$(date -d "@$(( $(date +%s) - 2592000 ))" +%Y%m%d)
              aws s3 ls "s3://influxdb-backups/monitoring/" --endpoint-url "$B2_ENDPOINT" | while read -r line; do
                FILE_NAME=$(echo "$line" | awk '{print $NF}')
                FILE_DATE=$(echo "$FILE_NAME" | grep -oE '[0-9]{8}' | head -1)
                if [ -n "$FILE_DATE" ] && [ "$FILE_DATE" -lt "$CUTOFF_DATE" ] 2>/dev/null; then
                  echo "Deleting old backup: $FILE_NAME"
                  aws s3 rm "s3://influxdb-backups/monitoring/${FILE_NAME}" --endpoint-url "$B2_ENDPOINT"
                fi
              done

              echo "[$(date)] InfluxDB backup job done!"
            env:
            - name: INFLUX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-backup-credentials
                  key: INFLUX_TOKEN
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: influxdb-backup-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: influxdb-backup-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              value: "garage"
            - name: B2_ENDPOINT
              value: "http://garage.monitoring.svc.cluster.local:3900"
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
