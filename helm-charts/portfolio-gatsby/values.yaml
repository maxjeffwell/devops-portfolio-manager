replicaCount: 2

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

image:
  client:
    repository: maxjeffwell/portfolio-gatsby
    tag: 20260301-063905-c192a82
    pullPolicy: IfNotPresent

service:
  client:
    type: NodePort
    port: 80
    targetPort: 80
    nodePort: 30012

resources:
  client:
    limits:
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

readinessProbe:
  tcpSocket:
    port: 80
  initialDelaySeconds: 2
  periodSeconds: 5

autoscaling:
  enabled: false

pdb:
  enabled: true
  maxUnavailable: 1

env:
  client: []

serviceAccount:
  create: false

podSecurityContext: {}

securityContext: {}

ingress:
  enabled: true
  host: el-jefe.me
  wwwRedirect: true

topologySpreadConstraints:
  enabled: true
  maxSkew: 1

nodeSelector: {}

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: node-role.kubernetes.io/worker
              operator: In
              values:
                - "true"
