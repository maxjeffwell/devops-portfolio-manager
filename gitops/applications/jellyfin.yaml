apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jellyfin
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/maxjeffwell/devops-portfolio-manager.git
    # Pinned to feature branch during rollout; flip to `main` after PR merge.
    targetRevision: feat/jellyfin-ollama-debian-marmoset
    path: k8s/jellyfin
  destination:
    server: https://kubernetes.default.svc
    namespace: jellyfin
  ignoreDifferences:
    # ESO injects defaults (conversionStrategy / decodingStrategy / metadataPolicy)
    # on every data entry. These never appear in the source YAML, so without this
    # ignore rule ArgoCD reports permanent OutOfSync on healthy ExternalSecrets.
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
