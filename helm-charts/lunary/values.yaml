priorityClassName: portfolio-app

replicaCount: 1

strategy:
  type: Recreate

image:
  backend:
    repository: maxjeffwell/lunary-backend
    tag: 20260310-051510-4765d53
    pullPolicy: Always
  frontend:
    repository: maxjeffwell/lunary-frontend
    tag: 20260310-051510-4765d53
    pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  backend:
    type: ClusterIP
    port: 3333
    targetPort: 3333
  frontend:
    type: ClusterIP
    port: 8080
    targetPort: 8080

ingress:
  enabled: true

resources:
  backend:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  frontend:
    limits:
      memory: 384Mi
    requests:
      cpu: 50m
      memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80

pdb:
  enabled: false
  maxUnavailable: 1

nodeSelector:
  gpu-node: "true"  # debian-marmoset; takes lunary off CP, colocates with litellm/Ollama AI stack
tolerations: []
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - vmi3115606

# Gate startup on the database being reachable. lunary-backend runs its
# materialized-view refresh synchronously at boot (index.ts:74) and calls
# process.exit(1) on a connection timeout, so any blip in cnpg-lunary-rw
# (single-instance CNPG, no failover target) crash-loops the pod. This init
# waits for Postgres to accept connections instead. Bounded at ~3min so a
# genuinely prolonged outage still surfaces as a restart rather than a
# permanently-Init pod. NOTE: portfolio-common applies initContainers to BOTH
# the backend and frontend Deployments; the frontend waiting on the DB is
# acceptable (the UI is non-functional during a DB outage anyway).
initContainers:
  - name: wait-for-db
    image: postgres:17-alpine
    imagePullPolicy: IfNotPresent
    command:
      - sh
      - -c
      - |
        echo "Waiting for cnpg-lunary-rw.default.svc.cluster.local:5432 ..."
        i=0
        until pg_isready -h cnpg-lunary-rw.default.svc.cluster.local -p 5432 -t 3 -q; do
          i=$((i + 1))
          if [ "$i" -ge 60 ]; then
            echo "Database still unreachable after ~180s; failing init to surface the outage."
            exit 1
          fi
          echo "  not ready (attempt $i/60), retrying in 3s"
          sleep 3
        done
        echo "Database is accepting connections."
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        memory: 32Mi

# DNS tuning for lunary pods. NodeLocal DNSCache (deployed cluster-wide) now handles
# the glibc UDP conntrack race that previously caused ~1/30 lookups to stall 5s
# (RES_TIMEOUT); single-request-reopen is therefore redundant and has been removed.
# ndots:2 is retained: lunary resolves cross-namespace FQDNs like
# cnpg-lunary-rw.default.svc.cluster.local (4 dots → absolute-first with ndots:2),
# which also skips the tailnet.el-jefe.me search-suffix for those names.
# NOTE: portfolio-common applies dnsConfig to both the backend and frontend Deployments.
dnsConfig:
  options:
    - name: ndots
      value: "2"

env:
  backend:
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "3333"
    - name: API_URL
      value: "https://lunary-api.el-jefe.me"
    - name: APP_URL
      value: "https://lunary.el-jefe.me"
    - name: SKIP_EMAIL_VERIFY
      value: "true"
    # Force IPv4-first DNS lookup. Node 18+ defaults to verbatim, causing the
    # `postgres` lib to attempt IPv6 first on cluster DNS, which times out.
    # See memory: feedback_nodejs_postgres_ipv4first
    - name: NODE_OPTIONS
      value: "--dns-result-order=ipv4first"
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: lunary-secrets
          key: jwt-secret
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: lunary-secrets
          key: database-url
  frontend:
    - name: NODE_ENV
      value: "production"
    - name: API_URL
      value: "https://lunary-api.el-jefe.me"

startupProbeBackend:
  httpGet:
    path: /v1/health
    port: 3333
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 18

# Liveness is a deadlock detector, not a slow-response detector. lunary-backend
# is healthy and self-recovers, but during a transient ~30-45s DB-reconnect storm
# (DB-backed requests pile up awaiting connect_timeout and starve the event loop)
# /v1/health goes briefly unresponsive. At 5s/15s/3 the old probe fired after ~45s
# and killed a recovering pod. Widened to ~2min tolerance so liveness only trips on
# a genuine, sustained hang. Readiness stays strict (below) so the pod is still
# pulled from the Service during the blip.
livenessProbeBackend:
  httpGet:
    path: /v1/health
    port: 3333
  periodSeconds: 20
  timeoutSeconds: 10
  failureThreshold: 6

readinessProbeBackend:
  httpGet:
    path: /v1/health
    port: 3333
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 12

livenessProbe:
  httpGet:
    path: /
    port: 8080
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 8080
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

secret:
  create: false

externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStoreName: doppler-secret-store
  secretStoreKind: ClusterSecretStore
  targetSecretName: lunary-secrets
  data:
    - secretKey: jwt-secret
      remoteKey: LUNARY_JWT_SECRET
    - secretKey: database-url
      remoteKey: LUNARY_DATABASE_URL
