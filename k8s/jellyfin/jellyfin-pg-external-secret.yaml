# Materializes Postgres credentials for the Jellyfin Deployment from Doppler.
# Same Doppler keys as cnpg-jellyfin's bootstrap (so the user/password match).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jellyfin-pg-external-secret
  namespace: jellyfin
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-secret-store
  target:
    name: jellyfin-pg-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - remoteRef:
        key: JELLYFIN_PG_USER
      secretKey: JELLYFIN_DATABASE_USER
    - remoteRef:
        key: JELLYFIN_PG_PASSWORD
      secretKey: JELLYFIN_DATABASE_PASSWORD
