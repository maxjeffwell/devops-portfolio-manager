# IngressRoute for the auth-path routes only — overlays the standard Ingress
# above with the additional jellyfin-ratelimit middleware. Traefik route
# matching uses path priority, so this more-specific Rule beats the catch-all.
# Reuses jellyfin-tls Secret created by cert-manager from the standard Ingress.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin-auth
  namespace: jellyfin
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`jellyfin-k8s.el-jefe.me`) && (PathPrefix(`/Users/AuthenticateByName`) || PathPrefix(`/Users/Public`))
      kind: Rule
      middlewares:
        - name: crowdsec-bouncer
          namespace: kube-system
        - name: jellyfin-ratelimit
      services:
        - name: jellyfin
          port: 8096
  tls:
    secretName: jellyfin-tls
