# Local copy of the kube-system crowdsec-bouncer Middleware, scoped to the
# jellyfin namespace. An IngressRoute can only reference a Middleware in its
# own namespace (Traefik rejects cross-namespace refs unless
# allowCrossNamespace=true), so jellyfin-auth references THIS local copy to
# keep CrowdSec IP-reputation/brute-force protection on the Jellyfin login
# paths. Config must stay in sync with k8s/traefik/crowdsec-bouncer-middleware.yaml
# (stream mode + updateMaxFailure: -1 fail-open; see that file's comment).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: crowdsec-bouncer
  namespace: jellyfin
spec:
  plugin:
    crowdsec-bouncer:
      enabled: true
      crowdsecLapiScheme: http
      crowdsecLapiHost: "10.0.0.4:8080"
      crowdsecLapiKeyFile: "/etc/crowdsec/lapi-key"
      updateIntervalSeconds: 15
      defaultDecisionSeconds: 300
      crowdsecMode: stream
      updateMaxFailure: -1
      forwardedHeadersTrustedIPs:
        - 173.245.48.0/20
        - 103.21.244.0/22
        - 103.22.200.0/22
        - 103.31.4.0/22
        - 141.101.64.0/18
        - 108.162.192.0/18
        - 190.93.240.0/20
        - 188.114.96.0/20
        - 197.234.240.0/22
        - 198.41.128.0/17
        - 162.158.0.0/15
        - 104.16.0.0/13
        - 104.24.0.0/14
        - 172.64.0.0/13
        - 131.0.72.0/22
      forwardedHeadersCustomName: "X-Forwarded-For"
