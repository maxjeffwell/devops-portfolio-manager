apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
  labels:
    app: jellyfin
    portfolio: "true"
spec:
  replicas: 1
  strategy:
    # Recreate avoids RWO PVC dual-attach during rollouts.
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
        portfolio: "true"
      annotations:
        # Opt OUT of kopia FS-backup for replaceable volumes (cluster default is
        # defaultVolumesToFsBackup=true). media-* are 2Ti each; cache is regenerable.
        # KEEP `config` (Mayastor) — irreplaceable library/watch-state metadata.
        backup.velero.io/backup-volumes-excludes: media-movies,media-tvshows,cache,recordings,rec-channels,rec-asustor
    spec:
      # 2026-06-06 — Resolve DNS against a per-pod CoreDNS cache sidecar
      # (127.0.0.1:53, see initContainers/dns-cache) instead of the kube-dns
      # ClusterIP. The ClusterIP load-balances lookups across CoreDNS replicas
      # on cloud nodes reached over the lossy WireGuard WAN (measured up to
      # 2.7s/lookup vs 0.00s same-node), which stalled request threads → live-TV
      # freezes and /health probe timeouts. dnsPolicy None makes 127.0.0.1 the
      # sole resolver; the sidecar caches + forwards to kube-dns so each name
      # crosses the WAN at most once per TTL.
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 127.0.0.1
        searches:
          - jellyfin.svc.cluster.local
          - svc.cluster.local
          - cluster.local
          - tailnet.el-jefe.me
        options:
          - { name: ndots, value: "1" }
      nodeSelector:
        gpu-node: "true"
      priorityClassName: portfolio-critical
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Native sidecar (restartPolicy: Always): per-pod DNS cache on
        # 127.0.0.1:53. As a native sidecar it starts and passes its
        # startupProbe BEFORE the encoding init container and the main
        # container run, so Jellyfin never starts without a resolver.
        # Forwards to kube-dns and caches — see configmap-coredns-sidecar.yaml.
        - name: dns-cache
          image: rancher/mirrored-coredns-coredns:1.13.1
          imagePullPolicy: IfNotPresent
          restartPolicy: Always
          args: ["-conf", "/etc/coredns/Corefile"]
          ports:
            - { name: dns-udp, containerPort: 53, protocol: UDP }
            - { name: dns-tcp, containerPort: 53, protocol: TCP }
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              # CoreDNS binds privileged :53 as non-root; grant only that.
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 128Mi }
          startupProbe:
            # Gate Jellyfin's start on the resolver being ready.
            httpGet: { path: /ready, port: 8181 }
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /ready, port: 8181 }
            periodSeconds: 10
          volumeMounts:
            - { name: coredns-config, mountPath: /etc/coredns, readOnly: true }
        # Recover encoding.xml if it's missing or corrupt.
        # 2026-05-24 — covers the failure mode where Jellyfin fails to deserialize
        # encoding.xml at startup ("error in XML document (1, 1)") and falls back
        # to defaults (HardwareAccelerationType=none), silently disabling HW accel.
        # Only writes when file is missing or invalid; user UI edits are preserved.
        - name: ensure-encoding-config
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              TARGET=/config/config/encoding.xml
              mkdir -p /config/config
              if [ ! -s "$TARGET" ] || ! grep -q '</EncodingOptions>' "$TARGET" 2>/dev/null; then
                echo "Restoring encoding.xml from ConfigMap (missing or corrupt)"
                cp /default/encoding.xml "$TARGET"
              else
                echo "encoding.xml is present and well-formed; leaving alone"
              fi
              # One-shot in-place migration (idempotent): the prior default
              # <TranscodingTempPath>/cache/transcodes</TranscodingTempPath> filled
              # the 10Gi cache PVC under load (errno -28). Reroute to the dedicated
              # /transcodes emptyDir so the cache PVC is preserved for fonts, images,
              # and attachments only.
              if grep -q '<TranscodingTempPath>/cache/transcodes</TranscodingTempPath>' "$TARGET" 2>/dev/null; then
                echo "Migrating TranscodingTempPath: /cache/transcodes -> /transcodes"
                sed -i 's|<TranscodingTempPath>/cache/transcodes</TranscodingTempPath>|<TranscodingTempPath>/transcodes</TranscodingTempPath>|' "$TARGET"
              fi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - { name: config, mountPath: /config }
            - { name: encoding-defaults, mountPath: /default, readOnly: true }
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:10.11.10
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8096
              protocol: TCP
          env:
            - { name: TZ,  value: America/New_York }
            - { name: PUID, value: "1000" }
            - { name: PGID, value: "1000" }
            - { name: JELLYFIN_PublishedServerUrl,                value: https://jellyfin-k8s.el-jefe.me }
            # NOTE: do not add JELLYFIN_FFmpeg__transcoding_temp_path — Jellyfin reads
            # EncodingOptions directly from encoding.xml and ignores env-var overrides
            # for that section. Set TranscodingTempPath in the ConfigMap instead.
            # Jellyfin uses default SQLite backend (jellyfin.db in /config).
            # PG attempt was abandoned in Phase 5 — JELLYFIN_DATABASE_* env vars
            # weren't honored (Jellyfin uses .NET-style JELLYFIN__... binding) AND
            # PG buys nothing meaningful for this single-process workload.
          resources:
            requests:
              cpu: "1"
              # Idle/playback uses ~320Mi; 1Gi reserves baseline + transcode
              # buffer headroom. Burst to limit during heavy transcoding is
              # still permitted.
              memory: 1Gi
              gpu.intel.com/i915: "1"
            limits:
              memory: 6Gi
              gpu.intel.com/i915: "1"
          volumeMounts:
            - { name: config,        mountPath: /config }
            - { name: cache,         mountPath: /cache }
            - { name: transcodes,    mountPath: /transcodes }
            - { name: media-movies,  mountPath: /media/movies,  readOnly: true }
            - { name: media-tvshows, mountPath: /media/tvshows, readOnly: true }
            # Writable DVR target: ASUSTOR /volume2/Recordings over NFS (rw).
            - { name: recordings,    mountPath: /recordings }
            # Read-only cross-mounts to browse the other engines' recordings.
            - { name: rec-channels,  mountPath: /recordings-channels, readOnly: true }
            - { name: rec-asustor,   mountPath: /recordings-asustor,  readOnly: true }
            - { name: tmp,           mountPath: /tmp }
            - { name: run,           mountPath: /var/run }
          livenessProbe:
            httpGet: { path: /health, port: 8096 }
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet: { path: /health, port: 8096 }
            periodSeconds: 10
          startupProbe:
            # 5min budget for first PG schema migration on cold start.
            httpGet: { path: /health, port: 8096 }
            periodSeconds: 10
            failureThreshold: 30
      volumes:
        - { name: config,        persistentVolumeClaim: { claimName: jellyfin-config-mayastor } }
        - { name: cache,         persistentVolumeClaim: { claimName: jellyfin-cache } }
        - { name: media-movies,  persistentVolumeClaim: { claimName: jellyfin-media-movies } }
        - { name: media-tvshows, persistentVolumeClaim: { claimName: jellyfin-media-tvshows } }
        - { name: recordings,    persistentVolumeClaim: { claimName: jellyfin-recordings } }
        - { name: rec-channels,  persistentVolumeClaim: { claimName: jellyfin-rec-channels, readOnly: true } }
        - { name: rec-asustor,   persistentVolumeClaim: { claimName: jellyfin-rec-asustor,  readOnly: true } }
        - name: transcodes
          # Disk-backed emptyDir on the node's kubelet dir. Was tmpfs (medium: Memory)
          # until 2026-05-24 — a RAM-backed mount counts against the pod's 6Gi memory
          # limit, so multi-GB HLS buffers were squeezing jellyfin toward OOM. Disk
          # path is fast enough for HLS segment IO, doesn't compete with jellyfin's
          # heap, and still auto-clears on pod restart (emptyDir lifecycle).
          emptyDir:
            sizeLimit: 12Gi
        - { name: tmp, emptyDir: { sizeLimit: 256Mi } }
        - { name: run, emptyDir: { sizeLimit: 64Mi } }
        - name: encoding-defaults
          configMap:
            name: jellyfin-encoding-defaults
        - name: coredns-config
          configMap:
            name: jellyfin-coredns-sidecar
