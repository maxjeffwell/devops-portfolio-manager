apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: qdrant
  labels:
    app: qdrant
    portfolio: "true"
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
        portfolio: "true"
    spec:
      nodeSelector:
        kubernetes.io/hostname: vmi3115606
      priorityClassName: portfolio-critical
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.12.4
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - { name: rest, containerPort: 6333, protocol: TCP }
            - { name: grpc, containerPort: 6334, protocol: TCP }
          env:
            - { name: QDRANT__SERVICE__HTTP_PORT, value: "6333" }
            - { name: QDRANT__SERVICE__GRPC_PORT, value: "6334" }
            - { name: QDRANT__TELEMETRY_DISABLED, value: "true" }
          resources:
            requests: { cpu: 500m, memory: 512Mi }
            limits:   { memory: 1Gi }
          volumeMounts:
            - { name: storage, mountPath: /qdrant/storage }
          livenessProbe:
            httpGet: { path: /healthz, port: 6333 }
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /readyz, port: 6333 }
            periodSeconds: 10
          startupProbe:
            httpGet: { path: /readyz, port: 6333 }
            periodSeconds: 5
            failureThreshold: 24
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi
        storageClassName: synology-iscsi
