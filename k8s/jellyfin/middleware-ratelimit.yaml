# Rate limit applied ONLY to the Jellyfin auth-path routes (composed via the
# IngressRoute, not as a global Ingress annotation — IPath-specific middlewares
# require IngressRoute, not standard Ingress). Stops brute-force at 5 req/min.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jellyfin-ratelimit
  namespace: jellyfin
spec:
  rateLimit:
    average: 5
    burst: 10
    period: 1m
    sourceCriterion:
      ipStrategy:
        depth: 1
