apiVersion: v1
kind: Service
metadata:
  name: xray
  namespace: {{ .Release.Namespace }}
  labels:
    app: xray
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 443
      nodePort: {{ .Values.service.nodePort }}
      protocol: TCP
      name: xray-reality
  selector:
    app: xray
