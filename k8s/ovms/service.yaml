apiVersion: v1
kind: Service
metadata:
  name: ovms-embeddings
  namespace: ovms
  labels:
    app: ovms-embeddings
spec:
  type: ClusterIP
  selector:
    app: ovms-embeddings
  ports:
    - { name: rest, port: 8000, targetPort: 8000, protocol: TCP }
    - { name: grpc, port: 9000, targetPort: 9000, protocol: TCP }
