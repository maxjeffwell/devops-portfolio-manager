# Daily on-prem coarse-DR backup → nas-local BSL (Garage S3 on Synology .109).
# Scope: ONLY fully-debian-marmoset-resident namespaces (residency-gated in plan Task 1;
# scope narrowed in Task 2 after the gate found 6 mixed namespaces with cloud-resident
# pods that cannot reach .109). Volume opt-outs via nas-local-volume-policy (NFS media)
# + jellyfin pod annotation (cache). Databases (cnpg/mongodb in the excluded mixed
# namespaces) stay covered by the existing logical backup jobs.
# Enabled after Task 8 path-validation (BSL=Available; node-agent same-node/no-netpol).
# Runs at 05:30 — clear of the 02:00 cluster-wide daily (which runs 1-2h) and the Sunday
# 03:00/04:00 weeklies — so it hits an idle Velero queue (backups run serially).
# Owned by the `backups` ArgoCD app.
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-backup-nas-local
  namespace: velero
spec:
  schedule: "30 5 * * *"
  paused: false
  # Velero owns this field: it consumes `true` (suppress catch-up on enable) then
  # resets to `false`. Declaring `false` matches the settled value so ArgoCD selfHeal
  # doesn't fight Velero in a perpetual OutOfSync loop.
  skipImmediately: false
  useOwnerReferencesInBackup: false
  template:
    storageLocation: nas-local
    defaultVolumesToFsBackup: true
    ttl: 720h
    resourcePolicy:
      kind: configmap
      name: nas-local-volume-policy
    includedNamespaces:
      - qdrant
      - vaultwarden
      - vertex-platform
      # jellyfin removed 2026-06-11 — decommissioned to ASUSTOR (scaled to 0), no pod to fs-backup.
      - cluster-nfs
