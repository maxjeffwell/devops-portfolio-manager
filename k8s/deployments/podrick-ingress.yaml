apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: podrick-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: kube-system-crowdsec-bouncer@kubernetescrd
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
  - host: podrick.el-jefe.me
    http:
      paths:
      - backend:
          service:
            name: devops-portfolio-dashboard
            port:
              number: 80
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - podrick.el-jefe.me
    secretName: podrick-tls
# NOTE: the podrick-api-route IngressRoute (and its strip-devops-api-prefix
# Middleware) were removed — they were a redundant, inert duplicate of
# k8s/ingress/devops-api-ingress.yaml, which already serves
# podrick.el-jefe.me/devops-api at priority 200 with the (working) CrowdSec
# bouncer + CORS + strip-prefix middlewares. /devops-api stays protected.
