{{- if .Values.snmpExporter.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: snmp-exporter-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: snmp-exporter
data:
  snmp.yml: |
    auths:
      {{ .Values.snmpExporter.auth.name }}:
        community: {{ .Values.snmpExporter.auth.community | quote }}
        security_level: noAuthNoPriv
        auth_protocol: MD5
        priv_protocol: DES
        version: 2
    modules:
      hrstorage:
        walk:
          - 1.3.6.1.2.1.25.1.1   # hrSystemUptime
          - 1.3.6.1.2.1.25.2.3   # hrStorageTable
          - 1.3.6.1.2.1.1.3      # sysUpTime
        get:
          - 1.3.6.1.2.1.1.3.0
        metrics:
          - name: sysUpTime
            oid: 1.3.6.1.2.1.1.3
            type: gauge
          - name: hrSystemUptime
            oid: 1.3.6.1.2.1.25.1.1
            type: gauge
          - name: hrStorageIndex
            oid: 1.3.6.1.2.1.25.2.3.1.1
            type: gauge
            indexes:
              - labelname: hrStorageIndex
                type: gauge
          - name: hrStorageType
            oid: 1.3.6.1.2.1.25.2.3.1.2
            type: OctetString
            indexes:
              - labelname: hrStorageIndex
                type: gauge
          - name: hrStorageDescr
            oid: 1.3.6.1.2.1.25.2.3.1.3
            type: DisplayString
            indexes:
              - labelname: hrStorageIndex
                type: gauge
          - name: hrStorageAllocationUnits
            oid: 1.3.6.1.2.1.25.2.3.1.4
            type: gauge
            indexes:
              - labelname: hrStorageIndex
                type: gauge
            lookups:
              - labels: [hrStorageIndex]
                labelname: hrStorageDescr
                oid: 1.3.6.1.2.1.25.2.3.1.3
                type: DisplayString
          - name: hrStorageSize
            oid: 1.3.6.1.2.1.25.2.3.1.5
            type: gauge
            indexes:
              - labelname: hrStorageIndex
                type: gauge
            lookups:
              - labels: [hrStorageIndex]
                labelname: hrStorageDescr
                oid: 1.3.6.1.2.1.25.2.3.1.3
                type: DisplayString
          - name: hrStorageUsed
            oid: 1.3.6.1.2.1.25.2.3.1.6
            type: gauge
            indexes:
              - labelname: hrStorageIndex
                type: gauge
            lookups:
              - labels: [hrStorageIndex]
                labelname: hrStorageDescr
                oid: 1.3.6.1.2.1.25.2.3.1.3
                type: DisplayString
{{- end }}
