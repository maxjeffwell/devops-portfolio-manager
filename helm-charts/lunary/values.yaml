priorityClassName: portfolio-app

replicaCount: 1

strategy:
  type: Recreate

image:
  backend:
    repository: maxjeffwell/lunary-backend
    tag: 20260310-051510-4765d53
    pullPolicy: Always
  frontend:
    repository: maxjeffwell/lunary-frontend
    tag: 20260310-051510-4765d53
    pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  backend:
    type: ClusterIP
    port: 3333
    targetPort: 3333
  frontend:
    type: ClusterIP
    port: 8080
    targetPort: 8080

ingress:
  enabled: true

resources:
  backend:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  frontend:
    limits:
      memory: 384Mi
    requests:
      cpu: 50m
      memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80

pdb:
  enabled: false
  maxUnavailable: 1

nodeSelector:
  gpu-node: "true"  # debian-marmoset; takes lunary off CP, colocates with litellm/Ollama AI stack
tolerations: []
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - vmi3115606

# Gate startup on the database being reachable. lunary-backend runs its
# materialized-view refresh synchronously at boot (index.ts:74) and calls
# process.exit(1) on a connection timeout, so any blip in cnpg-lunary-rw
# (single-instance CNPG, no failover target) crash-loops the pod. This init
# waits for Postgres to accept connections instead. Bounded at ~3min so a
# genuinely prolonged outage still surfaces as a restart rather than a
# permanently-Init pod. NOTE: portfolio-common applies initContainers to BOTH
# the backend and frontend Deployments; the frontend waiting on the DB is
# acceptable (the UI is non-functional during a DB outage anyway).
initContainers:
  - name: wait-for-db
    image: postgres:17-alpine
    imagePullPolicy: IfNotPresent
    command:
      - sh
      - -c
      - |
        echo "Waiting for cnpg-lunary-rw.default.svc.cluster.local:5432 ..."
        i=0
        until pg_isready -h cnpg-lunary-rw.default.svc.cluster.local -p 5432 -t 3 -q; do
          i=$((i + 1))
          if [ "$i" -ge 60 ]; then
            echo "Database still unreachable after ~180s; failing init to surface the outage."
            exit 1
          fi
          echo "  not ready (attempt $i/60), retrying in 3s"
          sleep 3
        done
        echo "Database is accepting connections."
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        memory: 32Mi

# Fix intermittent ~5s DNS stalls that were getting lunary-backend liveness-killed
# every few minutes. lunary lives in ns `lunary` but its DB is in ns `default`, so it
# resolves the cross-namespace name cnpg-lunary-rw.default.svc.cluster.local repeatedly.
# With the default ndots:5 + parallel A+AAAA getaddrinfo and no nodelocaldns, ~1/30
# lookups lose a UDP packet to the netfilter conntrack race and stall 5s (glibc
# RES_TIMEOUT); these saturate libuv's threadpool during postgres reconnects and hang
# /v1/health past the liveness timeout. Proven in-pod: A+AAAA = 1/30 stalls (max 5.2s),
# A-only = 0/30. single-request-reopen serializes A then AAAA (kills the race); ndots:2
# makes the 4-dot FQDN resolve absolute-first (fewer queries, skips the external
# tailnet.el-jefe.me search suffix). NOTE: portfolio-common applies dnsConfig to both
# the backend and frontend Deployments — harmless and equally beneficial to both.
dnsConfig:
  options:
    - name: single-request-reopen
    - name: ndots
      value: "2"

env:
  backend:
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "3333"
    - name: API_URL
      value: "https://lunary-api.el-jefe.me"
    - name: APP_URL
      value: "https://lunary.el-jefe.me"
    - name: SKIP_EMAIL_VERIFY
      value: "true"
    # Force IPv4-first DNS lookup. Node 18+ defaults to verbatim, causing the
    # `postgres` lib to attempt IPv6 first on cluster DNS, which times out.
    # See memory: feedback_nodejs_postgres_ipv4first
    - name: NODE_OPTIONS
      value: "--dns-result-order=ipv4first"
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: lunary-secrets
          key: jwt-secret
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: lunary-secrets
          key: database-url
  frontend:
    - name: NODE_ENV
      value: "production"
    - name: API_URL
      value: "https://lunary-api.el-jefe.me"

startupProbeBackend:
  httpGet:
    path: /v1/health
    port: 3333
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 18

livenessProbeBackend:
  httpGet:
    path: /v1/health
    port: 3333
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbeBackend:
  httpGet:
    path: /v1/health
    port: 3333
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 12

livenessProbe:
  httpGet:
    path: /
    port: 8080
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 8080
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

secret:
  create: false

externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStoreName: doppler-secret-store
  secretStoreKind: ClusterSecretStore
  targetSecretName: lunary-secrets
  data:
    - secretKey: jwt-secret
      remoteKey: LUNARY_JWT_SECRET
    - secretKey: database-url
      remoteKey: LUNARY_DATABASE_URL
