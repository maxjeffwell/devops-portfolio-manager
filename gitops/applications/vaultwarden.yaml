apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vaultwarden
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/maxjeffwell/devops-portfolio-manager.git
    targetRevision: main
    path: k8s/vaultwarden
  destination:
    server: https://kubernetes.default.svc
    namespace: vaultwarden
  ignoreDifferences:
    # ESO injects defaults on every data entry — ignore to avoid permanent OutOfSync.
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
    # CNPG operator injects spec defaults after each sync. managedFieldsManagers
    # alone doesn't catch them (the operator writes via Update, not server-side
    # Apply, which ArgoCD's managed-fields ignore keys off of), so the actual
    # defaulted paths are listed explicitly. Verified Synced with this set.
    - group: postgresql.cnpg.io
      kind: Cluster
      managedFieldsManagers:
        - manager
      jqPathExpressions:
        - .spec.storage.resizeInUseVolumes
        - .spec.affinity.podAntiAffinityType
        - .spec.bootstrap.initdb.encoding
        - .spec.bootstrap.initdb.localeCType
        - .spec.bootstrap.initdb.localeCollate
        - .spec.plugins[].enabled
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
