apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: crowdsec-bouncer
  namespace: kube-system
spec:
  plugin:
    crowdsec-bouncer:
      enabled: true
      crowdsecLapiScheme: http
      crowdsecLapiHost: "10.0.0.4:8080"
      crowdsecLapiKeyFile: "/etc/crowdsec/lapi-key"
      updateIntervalSeconds: 15
      defaultDecisionSeconds: 300
      # stream mode: bouncer serves bans from a locally-cached blocklist refreshed
      # every updateIntervalSeconds, so the LAPI is OFF the per-request path.
      # updateMaxFailure: -1 => never block when the LAPI is unreachable (fail-open).
      # This prevents a hung CrowdSec LAPI (e.g. ASUSTOR 10.0.0.4 flap) from
      # 403'ing every protected route (vaultwarden sign-in outage, 2026-06-03).
      crowdsecMode: stream
      updateMaxFailure: -1
      forwardedHeadersTrustedIPs:
        - 173.245.48.0/20
        - 103.21.244.0/22
        - 103.22.200.0/22
        - 103.31.4.0/22
        - 141.101.64.0/18
        - 108.162.192.0/18
        - 190.93.240.0/20
        - 188.114.96.0/20
        - 197.234.240.0/22
        - 198.41.128.0/17
        - 162.158.0.0/15
        - 104.16.0.0/13
        - 104.24.0.0/14
        - 172.64.0.0/13
        - 131.0.72.0/22
      forwardedHeadersCustomName: "X-Forwarded-For"
