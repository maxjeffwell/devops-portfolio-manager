apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-orchestration-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/maxjeffwell/portfolio-orchestration-platform.git
    targetRevision: main
    path: k8s/deployments
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  # Replicas are tuned out-of-band by HPA / manual scale on the platform deployments;
  # ignore so ArgoCD doesn't fight scaling decisions.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
