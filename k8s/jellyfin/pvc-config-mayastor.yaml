# Jellyfin /config — Mayastor replicated block storage (NVMe-oF/TCP).
# repl=2 across marmoset + debian-marmoset, target follows the pod.
# Replaces the earlier jellyfin-config PVC on openebs-lvmpv (which was
# debian-marmoset-only and not replicated).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config-mayastor
  namespace: jellyfin
  labels:
    app: jellyfin
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: mayastor-2
