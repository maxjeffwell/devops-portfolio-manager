apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-portfolio-to-monitoring
  namespace: default
spec:
  podSelector:
    matchLabels:
      portfolio: "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
        - port: 9999
          protocol: TCP
