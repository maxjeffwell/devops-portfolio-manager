apiVersion: apps/v1
kind: Deployment
metadata:
  name: ovms-embeddings
  namespace: ovms
  labels:
    app: ovms-embeddings
    portfolio: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ovms-embeddings
  template:
    metadata:
      labels:
        app: ovms-embeddings
        portfolio: "true"
    spec:
      nodeSelector:
        gpu-node: "true"
      priorityClassName: portfolio-critical
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ovms
          image: openvino/model_server:2025.4-gpu
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          args:
            - "--model_path=s3://ovms-models/e5-large"
            - "--model_name=e5-large"
            - "--port=9000"
            - "--rest_port=8000"
            - "--target_device=GPU"
            - "--log_level=INFO"
          ports:
            - { name: rest, containerPort: 8000, protocol: TCP }
            - { name: grpc, containerPort: 9000, protocol: TCP }
          env:
            - { name: AWS_REGION, value: us-east-1 }
            - { name: S3_ENDPOINT, value: s3.el-jefe.me }
            - { name: S3_USE_VIRTUAL_ADDRESSING, value: "0" }
            - { name: S3_USE_HTTPS, value: "1" }
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ovms-s3-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ovms-s3-credentials
                  key: AWS_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: "1"
              memory: 800Mi
              gpu.intel.com/i915: "1"
            limits:
              memory: 1500Mi
              gpu.intel.com/i915: "1"
          livenessProbe:
            httpGet: { path: /v2/health/live, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet: { path: /v2/health/ready, port: 8000 }
            periodSeconds: 10
          startupProbe:
            httpGet: { path: /v2/health/ready, port: 8000 }
            periodSeconds: 5
            failureThreshold: 24
