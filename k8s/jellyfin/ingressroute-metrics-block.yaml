# Blocks PUBLIC access to Jellyfin's /metrics (exposed once EnableMetrics=true).
# Prometheus scrapes the in-cluster Service (jellyfin.jellyfin.svc:8096) directly,
# which never traverses this ingress — so denying /metrics here has zero effect on
# monitoring while removing the unauthenticated public endpoint. The catch-all
# Ingress (path /) would otherwise serve /metrics behind only the crowdsec bouncer
# (IP-reputation, NOT auth).
#
# Deny-all idiom: ipAllowList scoped to a non-routable range so no real client
# (resolved via XFF depth 1, matching the rate-limit middleware) is ever allowed
# → Traefik returns 403 before reaching Jellyfin.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jellyfin-metrics-deny
  namespace: jellyfin
spec:
  ipAllowList:
    sourceRange:
      - 127.0.0.1/32
    ipStrategy:
      depth: 1
---
# Higher-priority route for /metrics; beats the catch-all Ingress and applies the
# deny middleware. Reuses the cert-manager jellyfin-tls Secret.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin-metrics-block
  namespace: jellyfin
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`jellyfin-k8s.el-jefe.me`) && PathPrefix(`/metrics`)
      kind: Rule
      priority: 1000
      middlewares:
        - name: jellyfin-metrics-deny
      services:
        - name: jellyfin
          port: 8096
  tls:
    secretName: jellyfin-tls
