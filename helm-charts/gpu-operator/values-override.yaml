# GPU Operator Helm values override
# Keeps operator + NFD master on the control-plane node (vmi2951245) so leader
# election lease renewals use loopback to the local API server, avoiding the
# cross-node network timeouts that cause CrashLoopBackOff.
#
# Managed by ArgoCD (gitops/applications/gpu-operator.yaml).
# After manual sync, re-run patch-operator-probes.sh to fix hardcoded operator probes.

# Preserve existing user values
driver:
  enabled: false
migManager:
  enabled: false
toolkit:
  enabled: true
devicePlugin:
  enabled: true
dcgmExporter:
  enabled: true
nodeStatusExporter:
  enabled: true

# GPU DaemonSets (device-plugin, toolkit, validator, etc.) need to tolerate
# both the standard nvidia.com/gpu taint and the custom workload=gpu taint on
# marmoset. Without both, DaemonSets show DESIRED: 0 and no GPU is advertised.
daemonsets:
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: gpu
      effect: NoSchedule

# Operator controller - no node affinity override (defaults to control-plane
# via chart's built-in preferredDuringScheduling for control-plane/master nodes)
operator:
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 128Mi

node-feature-discovery:
  # Bump to v0.18.3 (latest patch)
  image:
    repository: registry.k8s.io/nfd/node-feature-discovery
    tag: v0.18.3
  # NFD master - no node affinity override (defaults to control-plane via
  # chart's built-in toleration for control-plane/master nodes)
  # Leader election has a known panic bug in v0.18.x (NamespaceLister.stop nil
  # pointer on lease loss). Can't disable via values — flag is hardcoded in chart
  # template. Aggressive lease durations reduce loss frequency to near zero.
  master:
    config:
      extraLabelNs: ["nvidia.com"]
      leaderElection:
        leaseDuration: 120s
        renewDeadline: 90s
        retryPeriod: 10s
    livenessProbe:
      initialDelaySeconds: 15
      timeoutSeconds: 5
      periodSeconds: 20
      failureThreshold: 5
    readinessProbe:
      initialDelaySeconds: 10
      timeoutSeconds: 5
      periodSeconds: 10
      failureThreshold: 10
    resources:
      limits:
        memory: 4Gi
      requests:
        cpu: 100m
        memory: 128Mi
  # NFD worker - fix aggressive probe timeouts causing restarts on all nodes
  # Root cause: health server at :8080 starts slowly → "connection refused"
  # before liveness kicks in. startupProbe gates liveness until server is ready.
  worker:
    tolerations:
      - key: node-role.kubernetes.io/master
        operator: Equal
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Equal
        effect: NoSchedule
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      - key: workload
        operator: Equal
        value: gpu
        effect: NoSchedule
    startupProbe:
      httpGet:
        path: /healthz
        port: http
      periodSeconds: 10
      failureThreshold: 30
      timeoutSeconds: 5
    livenessProbe:
      initialDelaySeconds: 0
      timeoutSeconds: 5
      periodSeconds: 10
      failureThreshold: 5
    readinessProbe:
      initialDelaySeconds: 0
      timeoutSeconds: 5
      periodSeconds: 10
      failureThreshold: 10
  gc:
    livenessProbe:
      initialDelaySeconds: 10
      timeoutSeconds: 5
    readinessProbe:
      initialDelaySeconds: 5
      timeoutSeconds: 5
