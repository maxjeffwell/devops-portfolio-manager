# Static NFS PV for ASUSTOR /volume1/Movies (read-only).
# Capacity is metadata-only for static NFS PVs (not enforced by NFS or kubelet) —
# it only governs PVC-binding eligibility. Set to 2Ti as a nominal headroom (current
# usage ~266 GB; ASUSTOR /volume1 total is 3.6 TB).
# Server pinned to 192.168.50.133 (eth1) to consolidate with TV Shows on one NIC,
# off .149/eth2 which is now dedicated to Garage RPC (2026-06-02).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-media-movies
  labels:
    app: jellyfin
    media: movies
spec:
  capacity:
    storage: 2Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - ro
    - vers=3
    - nolock
    - hard
    - nconnect=8
  nfs:
    server: 192.168.50.133
    path: /volume1/Movies
